name: 🚀 Advanced Auto Dashboard

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  update-readme:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔧 root에 생성된 LeetCode 문제 폴더 정리
      - name: 📦 Organize LeetCode folders
        run: |
          mkdir -p leetcode

          for dir in 0*-*/; do
            if [ -d "$dir" ]; then

              name=$(basename "$dir")

              echo "Merging $name → leetcode/$name"

              mkdir -p "leetcode/$name"

              rsync -a "$dir" "leetcode/"

              echo "Removing root folder $name"
              rm -rf "$dir"

            fi
          done

      # 📊 Dashboard 업데이트
      - name: 📊 Update Dashboard
        run: |
          LC=$(find leetcode -maxdepth 1 -type d -name "0*" 2>/dev/null | wc -l)
          PR=$(find 프로그래머스 -type d -mindepth 2 2>/dev/null | wc -l)
          BJ=$(find 백준 -type d -mindepth 2 2>/dev/null | wc -l)

          TOTAL=$((LC + PR + BJ))

          RECENT=$(git log --pretty=format:"- %s" \
            --no-merges \
            --invert-grep \
            --grep="dashboard" \
            -n 5)

          awk -v lc="$LC" -v pr="$PR" -v bj="$BJ" -v total="$TOTAL" -v recent="$RECENT" '
          BEGIN { in_block=0 }
          /<!-- DASHBOARD-START -->/ {
              print "<!-- DASHBOARD-START -->"
              print "## 📊 Platform Statistics"
              print ""
              print "| Platform | Count |"
              print "|----------|-------|"
              print "| 🟡 LeetCode | " lc " |"
              print "| 🔵 Programmers | " pr " |"
              print "| 🟢 Baekjoon | " bj " |"
              print "| 🔢 **Total** | " total " |"
              print ""
              print "## 🥇 Recently Solved (Top 5)"
              print recent
              print ""
              print "<!-- DASHBOARD-END -->"
              in_block=1
              next
          }
          /<!-- DASHBOARD-END -->/ { in_block=0; next }
          !in_block { print }
          ' README.md > tmp.md && mv tmp.md README.md

      # 💾 Commit & Push
      - name: 💾 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 삭제된 폴더까지 반영
          git add -A

          if ! git diff --cached --quiet; then
            git commit -m "🚀 dashboard auto update [skip ci]"
          fi

          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push origin HEAD:${GITHUB_REF_NAME}